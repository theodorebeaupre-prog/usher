version: 2
project_name: usher
builds:
  - env: [CGO_ENABLED=0]
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    ldflags: ["-s -w -X main.version={{.Version}}"]
archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
homebrew_casks:
  - repository:
      owner: theodorebeaupre-prog
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/theodorebeaupre-prog/usher
    description: "One command. The right AI coding agent. Every time."
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/usher"]
          end
    # HOMEBREW_TAP_GITHUB_TOKEN secret is live (2026-07-12): cask publishes
    # on every stable tag; "auto" still skips prerelease version strings.
    skip_upload: auto
changelog:
  sort: asc
