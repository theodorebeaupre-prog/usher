name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-go@v5
        with: { go-version: '1.26' }
      - uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Homebrew tap push needs a PAT with repo scope on homebrew-tap:
          # set HOMEBREW_TAP_GITHUB_TOKEN in repo secrets, or formula upload
          # is skipped (skip_upload: auto).
