name: Bug report
description: Something routed wrong, launched wrong, or broke
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: usher version
      description: Output of `usher version`
      placeholder: usher 0.3.0
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: usher doctor output
      description: Paste the output of `usher doctor` (redact anything you like)
      render: console
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: The command you ran, what you expected, what you got. If routing surprised you, include `--why` output.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / terminal
      placeholder: macOS 15.5 / iTerm2
